<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bug Black Box</title>
  <meta name="description" content="Record console logs, JavaScript exceptions, network requests, and user action trails into structured bug reports.">
  <script>
    (() => {
      try {
        const theme = localStorage.getItem("bbb-web-theme");
        if (theme === "light" || theme === "dark") {
          document.documentElement.dataset.theme = theme;
        }
      } catch (err) {
        document.documentElement.removeAttribute("data-theme");
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
