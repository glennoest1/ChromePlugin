<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bug Black Box Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="page">
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Bug Black Box</h1>
    </div>

    <section class="panel">
      <div>
        <p class="panel-title">Gemini API Key</p>
        <p class="panel-desc">Lưu API key Gemini tại đây để bật tính năng AI Explain. Key được lưu cục bộ trên trình duyệt của bạn, không gửi đi đâu.</p>
      </div>

      <hr class="divider">

      <div>
        <label class="field-label" for="apiKey">API Key</label>
        <div class="input-wrap">
          <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="AIza...">
          <button type="button" class="toggle-password" id="togglePassword" title="Show / Hide key" aria-label="Toggle key visibility">👁</button>
        </div>
      </div>

      <div class="actions">
        <button id="saveButton" class="button button-blue">Save Key</button>
        <button id="clearButton" class="button button-light">Clear Key</button>
      </div>

      <p id="status" class="status" role="status"></p>

      <p class="info-footer">🔒 Key được lưu trong <code>chrome.storage.local</code> và chỉ được dùng để gọi Gemini API.</p>
    </section>
  </main>
  <script src="options.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('apiKey');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      this.textContent = isPassword ? '🙈' : '👁';
    });
  </script>
</body>
</html>
