<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Recording Preview</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<main class="shell">
  <div id="app">
    <section class="panel">
      <div class="status-banner">
        <span class="record-dot" aria-hidden="true"></span>
        <span>Recording&nbsp;<span id="timer">02:47</span></span>
      </div>
      <div class="summary-grid">
        <div><strong>Current tab</strong><span>mode</span></div>
        <div><strong>1</strong><span>tab captured</span></div>
      </div>
      <div class="stats">
        <div class="stat"><strong>14</strong><span>Logs</span></div>
        <div class="stat"><strong>2</strong><span>Errors</span></div>
        <div class="stat"><strong>8</strong><span>Actions</span></div>
        <div class="stat"><strong>6</strong><span>Network</span></div>
      </div>
      <button class="button button-dark">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="currentColor"/></svg>
        Stop &amp; Create Report
      </button>
      <p class="muted">Giữ tab mục tiêu mở cho đến khi screenshot được chụp xong.</p>
    </section>
  </div>
</main>
</body>
</html>
