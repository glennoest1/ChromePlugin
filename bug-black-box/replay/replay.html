<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bug Black Box Replay</title>
  <link rel="stylesheet" href="../vendor/rrweb-player.css">
  <link rel="stylesheet" href="replay.css">
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>Session Replay</h1>
        <p id="meta" class="muted">Loading replay...</p>
      </div>
      <label class="tab-control" for="tabSelect">
        <span>Replay tab</span>
        <select id="tabSelect"></select>
      </label>
      <div class="summary">
        <div>
          <span>Events</span>
          <strong id="eventCount">0</strong>
        </div>
        <div>
          <span>Duration</span>
          <strong id="duration">00:00</strong>
        </div>
      </div>
    </header>

    <section id="emptyState" class="empty" hidden>No session replay data found.</section>

    <section id="replayShell" class="replay-shell" hidden>
      <div id="player" class="player"></div>

      <div class="controls" aria-label="Replay controls">
        <button id="playButton" class="control-button primary" type="button">Play</button>
        <button id="restartButton" class="control-button" type="button">Restart</button>

        <div class="timeline-wrap">
          <div class="time-row">
            <span id="currentTime">00:00</span>
            <span id="totalTime">00:00</span>
          </div>
          <input id="seekRange" class="timeline" type="range" min="0" max="1000" value="0" step="1">
        </div>

        <label class="speed-control" for="speedSelect">
          <span>Speed</span>
          <select id="speedSelect">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
            <option value="8">8x</option>
          </select>
        </label>
      </div>
    </section>
  </main>
  <script src="../vendor/rrweb-player.min.js"></script>
  <script src="replay.js"></script>
</body>
</html>
